<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Návyková kasička</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Instrument+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

* { box-sizing: border-box; }
html, body { margin:0; padding:0; }
.wrap {
  --bg:#e9efe7; --ink:#1c2b22; --pine:#2f5d4f; --pine-deep:#234a3e;
  --honey:#cf962b; --paper:#fbfcf8; --line:#d3ddd1; --muted:#6b7a70;
  min-height:100vh; background:var(--bg); color:var(--ink);
  font-family:'Instrument Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased; padding:18px 14px 48px;
}
.loading { text-align:center; padding:80px 0; color:var(--muted); font-style:italic; }
.app { max-width:520px; margin:0 auto; }

.head { margin:6px 2px 18px; position:relative; }
.eyebrow { font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--pine); font-weight:600; margin:0 0 6px; }
.h1 { font-family:'Fraunces',serif; font-weight:600; font-size:26px; line-height:1.12; margin:0; letter-spacing:-.01em; }
.sync { display:inline-flex; align-items:center; gap:6px; margin-top:10px; font-size:12px; color:var(--muted); }
.dot { width:8px; height:8px; border-radius:50%; background:var(--muted); }
.sync.saved .dot { background:#3a8a5f; }
.sync.saving .dot { background:var(--honey); animation:pulse 1s infinite; }
.sync.error .dot { background:#a8392c; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.hero {
  background:linear-gradient(160deg,#2f5d4f,#234a3e);
  color:#f3f7f1; border-radius:22px; padding:20px;
  display:flex; gap:14px; align-items:center; box-shadow:0 14px 30px -18px rgba(35,74,62,.7);
}
.jar-col { flex:0 0 96px; }
.jar { width:96px; height:auto; display:block; }
.jar-fill { transition:y .55s cubic-bezier(.2,.8,.2,1), height .55s cubic-bezier(.2,.8,.2,1); }
.hero-body { flex:1; min-width:0; }
.label { margin:0; font-size:12px; letter-spacing:.14em; text-transform:uppercase; opacity:.7; }
.total {
  font-family:'Space Mono',monospace; font-weight:700; font-size:30px; line-height:1.1;
  margin:2px 0 2px; position:relative; letter-spacing:-.02em;
}
.flash {
  position:absolute; left:0; top:-4px; font-size:14px; color:#f4d68a;
  animation:rise 1.1s ease-out forwards; pointer-events:none;
}
@keyframes rise { 0%{opacity:0;transform:translateY(6px)} 18%{opacity:1} 100%{opacity:0;transform:translateY(-22px)} }
.sub { margin:0 0 14px; font-size:13px; opacity:.82; }
.sub strong { color:#f4d68a; font-weight:700; }

.goal-bar { height:9px; background:rgba(255,255,255,.18); border-radius:6px; overflow:hidden; }
.goal-bar span { display:block; height:100%; background:linear-gradient(90deg,#eac874,#cf962b); border-radius:6px; transition:width .5s ease; }
.goal-text { margin:8px 0 8px; font-size:13px; opacity:.92; }
.goal-text strong { color:#f4d68a; }
.goal-name { font-weight:600; }
.ghost {
  background:transparent; border:1px solid rgba(255,255,255,.35); color:#f3f7f1;
  padding:6px 12px; border-radius:9px; font-size:13px; font-family:inherit; cursor:pointer;
}
.ghost:hover { background:rgba(255,255,255,.1); }

.editor { margin-top:6px; }
.fld { display:block; margin-bottom:10px; }
.fld span { display:block; font-size:12px; opacity:.78; margin-bottom:4px; }
.fld input {
  width:100%; padding:9px 11px; border-radius:9px; border:1px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.95); color:var(--ink); font-family:inherit; font-size:15px;
}
.editor-actions { display:flex; gap:8px; }
.solid {
  background:var(--honey); border:none; color:#241804; font-weight:600;
  padding:8px 16px; border-radius:9px; font-family:inherit; font-size:14px; cursor:pointer;
}

.card {
  background:var(--paper); border:1px solid var(--line); border-radius:18px;
  padding:16px; margin-top:14px;
}
.sec-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; }
.h2 { font-family:'Fraunces',serif; font-weight:600; font-size:18px; margin:0; }
.count { font-family:'Space Mono',monospace; font-weight:700; font-size:14px; color:var(--pine); }
.muted-count { color:var(--muted); font-family:'Instrument Sans',sans-serif; font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:.08em; }

.weeknav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.week-title { font-family:'Fraunces',serif; font-size:16px; font-weight:600; }
.arrow {
  width:34px; height:34px; border-radius:10px; border:1px solid var(--line);
  background:#fff; font-size:20px; line-height:1; color:var(--pine); cursor:pointer;
}
.arrow:hover { background:var(--bg); }
.chips { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.chip {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:7px 2px 6px; border-radius:11px; border:1px solid transparent;
  background:var(--bg); cursor:pointer; font-family:inherit;
}
.chip-wd { font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
.chip-num { font-size:15px; font-weight:600; color:var(--ink); }
.chip-bar { width:20px; height:3px; border-radius:2px; background:var(--line); overflow:hidden; }
.chip-bar span { display:block; height:100%; background:var(--pine); }
.chip.sel { background:#fff; border-color:var(--pine); box-shadow:0 0 0 1px var(--pine) inset; }
.chip.future { opacity:.4; cursor:not-allowed; }

.list { list-style:none; margin:0; padding:0; }
.row { border-radius:12px; }
.row + .row { margin-top:7px; }
.row-btn {
  width:100%; display:flex; align-items:center; gap:12px; padding:11px 12px;
  background:var(--bg); border:1px solid transparent; border-radius:12px;
  cursor:pointer; font-family:inherit; text-align:left; transition:background .15s;
}
.row-btn:hover { background:#e2eade; }
.box {
  flex:0 0 24px; width:24px; height:24px; border-radius:7px; border:2px solid var(--line);
  display:grid; place-items:center; color:#fff; font-size:14px; background:#fff; transition:all .15s;
}
.box.on { background:var(--pine); border-color:var(--pine); }
.row-name { flex:1; font-size:15px; color:var(--ink); }
.row-reward { font-family:'Space Mono',monospace; font-size:13px; color:var(--muted); font-weight:700; }
.row.done .row-name { color:var(--muted); }
.row.done .row-reward { color:var(--honey); }

.perfect.unlocked { border-color:var(--honey); background:#fbf5e8; }
.perfect-bar {
  position:relative; height:11px; background:var(--bg); border-radius:7px; overflow:hidden; margin-bottom:9px;
}
.perfect-bar span { display:block; height:100%; background:linear-gradient(90deg,#3a6f5e,#2f5d4f); transition:width .5s ease; }
.perfect.unlocked .perfect-bar span { background:linear-gradient(90deg,#eac874,#cf962b); }
.perfect-bar i {
  position:absolute; top:-2px; width:2px; height:15px; background:var(--honey); transform:translateX(-1px);
}
.perfect-text { margin:0; font-size:13px; color:var(--muted); }

.backup { padding:0; overflow:hidden; }
.backup-toggle {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding:16px; background:none; border:none; cursor:pointer; font-family:inherit; color:var(--ink);
}
.chev { font-size:20px; color:var(--pine); font-weight:700; line-height:1; }
.backup-body { padding:0 16px 16px; }
.backup-hint { margin:0 0 14px; font-size:13px; color:var(--muted); line-height:1.5; }
.backup-label { margin:0 0 6px; font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--pine); font-weight:600; }
.backup-code {
  width:100%; resize:vertical; padding:10px 12px; border-radius:10px; border:1px solid var(--line);
  background:var(--bg); color:var(--ink); font-family:'Space Mono',monospace; font-size:12px;
  line-height:1.5; margin-bottom:8px; word-break:break-all;
}
.solid.dark { background:var(--pine); color:#f3f7f1; }
.ghost.dark { border-color:var(--line); color:var(--pine); }
.ghost.dark:hover { background:var(--bg); }
.ghost.dark:disabled { opacity:.45; cursor:not-allowed; }
.backup-msg { margin:12px 0 0; font-size:13px; color:var(--pine); font-weight:500; }

.foot { margin-top:20px; text-align:center; }
.foot p { font-size:12px; color:var(--muted); margin:0 0 8px; }
.reset {
  background:none; border:none; color:var(--muted); font-size:12px; text-decoration:underline;
  cursor:pointer; font-family:inherit; padding:4px 6px;
}
.reset.danger { color:#a8392c; font-weight:600; }
.reset-confirm { font-size:12px; color:var(--muted); display:inline-flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:center; }

@media (prefers-reduced-motion: reduce) {
  .jar-fill, .goal-bar span, .perfect-bar span { transition:none; }
  .flash { animation:none; opacity:0; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* =====================================================================
   NASTAVENÍ — změň si HESLO níže a stejné dej do api.php (TOKEN).
   ===================================================================== */
const API = "api.php";        // soubor na stejném serveru vedle index.html
const TOKEN = "ZMEN_SI_ME";   // libovolné heslo, MUSÍ sedět s api.php

/* ----------------------------- data model ----------------------------- */
const DAILY_HABITS = [
  { id: "browser", name: "Promazat prohlížeč a maily", reward: 50 },
  { id: "ai_edu", name: "AI vzdělávání", reward: 50 },
  { id: "ai_use", name: "AI použití", reward: 50 },
  { id: "diet", name: "Hubnoucí plán", reward: 50 },
  { id: "nosugar", name: "Bez sladkého a tučného", reward: 50 },
  { id: "nopay", name: "Den bez platby", reward: 50 },
];
const WEEKLY_HABITS = [{ id: "photos", name: "Promazat fotografie", reward: 100 }];
const PERFECT_BONUS = 500;
const PERFECT_THRESHOLD = 0.8;
const POSSIBLE_PER_WEEK = DAILY_HABITS.length * 7 + WEEKLY_HABITS.length;
const DAILY_BY_ID = Object.fromEntries(DAILY_HABITS.map((h) => [h.id, h]));
const WEEKLY_BY_ID = Object.fromEntries(WEEKLY_HABITS.map((h) => [h.id, h]));
const DEFAULT_DATA = { daily: {}, weekly: {}, goal: { name: "Odměna", amount: 5000 } };
const WEEKDAYS = ["Po", "Út", "St", "Čt", "Pá", "So", "Ne"];
const MONTHS = ["ledna","února","března","dubna","května","června","července","srpna","září","října","listopadu","prosince"];

/* ----------------------------- helpers ----------------------------- */
const fmt = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const parse = (s) => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const mondayOf = (s) => { const d=parse(s); const sh=(d.getDay()+6)%7; d.setDate(d.getDate()-sh); return fmt(d); };
const weekDates = (m) => { const md=parse(m); return [...Array(7)].map((_,i)=>{const x=new Date(md);x.setDate(md.getDate()+i);return fmt(x);}); };
const addDays = (s,n) => { const d=parse(s); d.setDate(d.getDate()+n); return fmt(d); };
const money = (n) => `${(n||0).toLocaleString("cs-CZ")} Kč`;

const encodeBackup = (data) => { try { return btoa(unescape(encodeURIComponent(JSON.stringify(data)))); } catch(e){ return ""; } };
const decodeBackup = (text) => {
  const t=(text||"").trim(); if(!t) return null;
  try { return JSON.parse(decodeURIComponent(escape(atob(t)))); } catch(e){}
  try { return JSON.parse(t); } catch(e){}
  return null;
};

/* ----------------------------- server I/O ----------------------------- */
async function apiLoad() {
  const r = await fetch(`${API}?token=${encodeURIComponent(TOKEN)}`, { cache: "no-store" });
  if (!r.ok) throw new Error("load " + r.status);
  return await r.json();
}
async function apiSave(data) {
  const r = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token: TOKEN, data }),
  });
  if (!r.ok) throw new Error("save " + r.status);
}

/* ----------------------------- calculations ----------------------------- */
function weekRatio(data, monday) {
  let done = 0;
  for (const d of weekDates(monday)) done += (data.daily[d]||[]).filter((id)=>DAILY_BY_ID[id]).length;
  done += (data.weekly[monday]||[]).filter((id)=>WEEKLY_BY_ID[id]).length;
  return done / POSSIBLE_PER_WEEK;
}
function computeTotals(data) {
  let base = 0;
  for (const ids of Object.values(data.daily)) for (const id of ids) if (DAILY_BY_ID[id]) base += DAILY_BY_ID[id].reward;
  for (const ids of Object.values(data.weekly)) for (const id of ids) if (WEEKLY_BY_ID[id]) base += WEEKLY_BY_ID[id].reward;
  const weeks = new Set(Object.keys(data.weekly));
  for (const date of Object.keys(data.daily)) weeks.add(mondayOf(date));
  let bonus = 0, perfectCount = 0;
  for (const wk of weeks) if (weekRatio(data, wk) >= PERFECT_THRESHOLD) { bonus += PERFECT_BONUS; perfectCount++; }
  return { total: base + bonus, base, bonus, perfectCount };
}

/* ----------------------------- jar ----------------------------- */
function Jar({ ratio }) {
  const top = 108 - Math.max(0, Math.min(1, ratio)) * 78;
  return (
    <svg viewBox="0 0 100 124" className="jar" aria-hidden="true">
      <defs>
        <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor="#e9c873" />
          <stop offset="1" stopColor="#cf962b" />
        </linearGradient>
        <clipPath id="inside">
          <path d="M22 30 H78 V104 a8 8 0 0 1 -8 8 H30 a8 8 0 0 1 -8 -8 Z" />
        </clipPath>
      </defs>
      <g clipPath="url(#inside)">
        <rect x="18" y={top} width="64" height="120" fill="url(#gold)" className="jar-fill" />
        <ellipse cx="50" cy={top} rx="32" ry="4" fill="#f0d690" className="jar-fill" />
      </g>
      <path d="M22 30 H78 V104 a8 8 0 0 1 -8 8 H30 a8 8 0 0 1 -8 -8 Z" fill="none" stroke="#234a3e" strokeWidth="3" />
      <rect x="18" y="20" width="64" height="12" rx="4" fill="#2f5d4f" />
      <rect x="30" y="13" width="40" height="9" rx="3" fill="#234a3e" />
      <line x1="32" y1="40" x2="32" y2="100" stroke="#ffffff" strokeOpacity="0.25" strokeWidth="3" strokeLinecap="round" />
    </svg>
  );
}

/* ----------------------------- main ----------------------------- */
function App() {
  const [data, setData] = useState(DEFAULT_DATA);
  const [loaded, setLoaded] = useState(false);
  const [selected, setSelected] = useState(fmt(new Date()));
  const [editGoal, setEditGoal] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);
  const [flash, setFlash] = useState(null);
  const [sync, setSync] = useState("idle");
  const flashId = useRef(0);
  const saveTimer = useRef(null);
  const saving = useRef(false);

  const today = fmt(new Date());
  const mergeData = (d) => ({ ...DEFAULT_DATA, ...d, goal: { ...DEFAULT_DATA.goal, ...(d.goal||{}) } });

  useEffect(() => {
    (async () => {
      try { const d = await apiLoad(); setData(mergeData(d)); setSync("saved"); }
      catch (e) { setSync("error"); }
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setSync("saving");
    saveTimer.current = setTimeout(async () => {
      saving.current = true;
      try { await apiSave(data); setSync("saved"); } catch (e) { setSync("error"); }
      saving.current = false; saveTimer.current = null;
    }, 600);
  }, [data, loaded]);

  // při návratu na záložku načti nejnovější data z druhého zařízení
  useEffect(() => {
    const onFocus = async () => {
      if (saving.current || saveTimer.current) return;
      try { const d = await apiLoad(); setData(mergeData(d)); setSync("saved"); } catch (e) {}
    };
    window.addEventListener("focus", onFocus);
    return () => window.removeEventListener("focus", onFocus);
  }, []);

  const totals = useMemo(() => computeTotals(data), [data]);
  const goalAmount = data.goal?.amount || 0;
  const progress = goalAmount > 0 ? Math.min(1, totals.total / goalAmount) : 0;
  const remaining = Math.max(0, goalAmount - totals.total);

  const monday = mondayOf(selected);
  const weekR = weekRatio(data, monday);
  const weekDone = Math.round(weekR * POSSIBLE_PER_WEEK);
  const isPerfect = weekR >= PERFECT_THRESHOLD;

  const dayIds = new Set(data.daily[selected] || []);
  const weekIds = new Set(data.weekly[monday] || []);
  const dailyDoneToday = DAILY_HABITS.filter((h) => dayIds.has(h.id)).length;

  const celebrate = (amount) => {
    flashId.current += 1;
    setFlash({ id: flashId.current, amount });
    setTimeout(() => setFlash((f) => (f && f.id === flashId.current ? null : f)), 1100);
  };

  const toggleDaily = (id) => {
    const on = dayIds.has(id);
    setData((prev) => {
      const set = new Set(prev.daily[selected] || []);
      on ? set.delete(id) : set.add(id);
      const daily = { ...prev.daily, [selected]: [...set] };
      if (set.size === 0) delete daily[selected];
      return { ...prev, daily };
    });
    if (!on) celebrate(DAILY_BY_ID[id].reward);
  };
  const toggleWeekly = (id) => {
    const on = weekIds.has(id);
    setData((prev) => {
      const set = new Set(prev.weekly[monday] || []);
      on ? set.delete(id) : set.add(id);
      const weekly = { ...prev.weekly, [monday]: [...set] };
      if (set.size === 0) delete weekly[monday];
      return { ...prev, weekly };
    });
    if (!on) celebrate(WEEKLY_BY_ID[id].reward);
  };

  const chips = weekDates(monday);
  const monLabel = parse(monday);
  const weekTitle = `${monLabel.getDate()}.–${parse(chips[6]).getDate()}. ${MONTHS[parse(chips[6]).getMonth()]}`;

  const syncLabel = { saving: "Ukládám…", saved: "Uloženo na serveru", error: "Offline – ukládám lokálně", idle: "" }[sync];

  if (!loaded) {
    return <div className="wrap"><div className="loading">Načítám tvou kasičku…</div></div>;
  }

  return (
    <div className="wrap">
      <div className="app">
        <header className="head">
          <p className="eyebrow">Návyková kasička</p>
          <h1 className="h1">Každý splněný návyk = peníze stranou</h1>
          <span className={`sync ${sync}`}><span className="dot" />{syncLabel}</span>
        </header>

        <section className="hero">
          <div className="jar-col"><Jar ratio={goalAmount > 0 ? progress : 0.4} /></div>
          <div className="hero-body">
            <p className="label">Našetřeno</p>
            <div className="total">
              {money(totals.total)}
              {flash && <span key={flash.id} className="flash">+{money(flash.amount)}</span>}
            </div>
            <p className="sub">
              z toho <strong>{money(totals.bonus)}</strong> za perfektní týdny
              {totals.perfectCount > 0 ? ` (${totals.perfectCount}×)` : ""}
            </p>
            {!editGoal ? (
              <div className="goal">
                <div className="goal-bar"><span style={{ width: `${progress*100}%` }} /></div>
                <p className="goal-text">
                  {remaining > 0
                    ? <>Zbývá <strong>{money(remaining)}</strong> do cíle: <span className="goal-name">{data.goal.name}</span></>
                    : <>Cíl <span className="goal-name">{data.goal.name}</span> splněn! 🎉</>}
                </p>
                <button className="ghost" onClick={() => setEditGoal(true)}>Upravit cíl</button>
              </div>
            ) : (
              <GoalEditor goal={data.goal}
                onSave={(g) => { setData((p) => ({ ...p, goal: g })); setEditGoal(false); }}
                onCancel={() => setEditGoal(false)} />
            )}
          </div>
        </section>

        <section className="card">
          <div className="weeknav">
            <button className="arrow" onClick={() => setSelected(addDays(selected, -7))}>‹</button>
            <span className="week-title">{weekTitle}</span>
            <button className="arrow" onClick={() => setSelected(addDays(selected, 7))}>›</button>
          </div>
          <div className="chips">
            {chips.map((d, i) => {
              const future = d > today;
              const r = (data.daily[d] || []).filter((id) => DAILY_BY_ID[id]).length / DAILY_HABITS.length;
              return (
                <button key={d} className={`chip${d===selected?" sel":""}${future?" future":""}`}
                  onClick={() => !future && setSelected(d)} disabled={future}>
                  <span className="chip-wd">{WEEKDAYS[i]}</span>
                  <span className="chip-num">{parse(d).getDate()}</span>
                  <span className="chip-bar"><span style={{ width: `${r*100}%` }} /></span>
                </button>
              );
            })}
          </div>
        </section>

        <section className="card">
          <div className="sec-head">
            <h2 className="h2">Denní návyky</h2>
            <span className="count">{dailyDoneToday}/{DAILY_HABITS.length}{selected===today?" dnes":""}</span>
          </div>
          <ul className="list">
            {DAILY_HABITS.map((h) => <HabitRow key={h.id} habit={h} checked={dayIds.has(h.id)} onToggle={() => toggleDaily(h.id)} />)}
          </ul>
        </section>

        <section className="card">
          <div className="sec-head">
            <h2 className="h2">Týdenní návyky</h2>
            <span className="count muted-count">tento týden</span>
          </div>
          <ul className="list">
            {WEEKLY_HABITS.map((h) => <HabitRow key={h.id} habit={h} checked={weekIds.has(h.id)} onToggle={() => toggleWeekly(h.id)} />)}
          </ul>
        </section>

        <section className={`card perfect${isPerfect?" unlocked":""}`}>
          <div className="sec-head">
            <h2 className="h2">Perfektní týden</h2>
            <span className="count">{money(PERFECT_BONUS)}</span>
          </div>
          <div className="perfect-bar">
            <span style={{ width: `${Math.min(100, weekR*100)}%` }} />
            <i style={{ left: `${PERFECT_THRESHOLD*100}%` }} />
          </div>
          <p className="perfect-text">
            {isPerfect
              ? <>Hotovo — bonus {money(PERFECT_BONUS)} připsán. Splněno {weekDone}/{POSSIBLE_PER_WEEK} ({Math.round(weekR*100)} %).</>
              : <>Splněno {weekDone}/{POSSIBLE_PER_WEEK} ({Math.round(weekR*100)} %). Na bonus potřebuješ 80 %.</>}
          </p>
        </section>

        <BackupCard data={data} onRestore={(d) => setData(mergeData(d))} />

        <footer className="foot">
          <p>Ukládá se automaticky na tvůj server do souboru data.json.</p>
          {!confirmReset ? (
            <button className="reset" onClick={() => setConfirmReset(true)}>Vynulovat vše</button>
          ) : (
            <span className="reset-confirm">
              Opravdu smazat veškerý postup?
              <button className="reset danger" onClick={() => { setData({ ...DEFAULT_DATA }); setConfirmReset(false); }}>Ano, smazat</button>
              <button className="reset" onClick={() => setConfirmReset(false)}>Zrušit</button>
            </span>
          )}
        </footer>
      </div>
    </div>
  );
}

function BackupCard({ data, onRestore }) {
  const [open, setOpen] = useState(false);
  const [paste, setPaste] = useState("");
  const [copied, setCopied] = useState(false);
  const [msg, setMsg] = useState(null);
  const code = useMemo(() => encodeBackup(data), [data]);
  const taRef = useRef(null);
  const copy = async () => {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) await navigator.clipboard.writeText(code);
      else if (taRef.current) { taRef.current.select(); document.execCommand("copy"); }
      setCopied(true); setTimeout(() => setCopied(false), 1800);
    } catch (e) { if (taRef.current) taRef.current.select(); setMsg("Označený text zkopíruj ručně."); }
  };
  const restore = () => {
    const d = decodeBackup(paste);
    if (d && (d.daily || d.weekly)) { onRestore(d); setPaste(""); setMsg("Hotovo — postup obnoven. ✓"); setTimeout(() => setMsg(null), 2500); }
    else setMsg("Kód se nepodařilo načíst.");
  };
  return (
    <section className="card backup">
      <button className="backup-toggle" onClick={() => setOpen((o) => !o)}>
        <span className="h2">Ruční záloha (pojistka)</span>
        <span className="chev">{open ? "−" : "+"}</span>
      </button>
      {open && (
        <div className="backup-body">
          <p className="backup-hint">Pojistka pro případ potíží se serverem: zkopíruj si kód a ulož ho. Vložením zpět postup obnovíš.</p>
          <p className="backup-label">Tvůj zálohovací kód</p>
          <textarea ref={taRef} className="backup-code" readOnly value={code} rows={3} />
          <button className="solid dark" onClick={copy}>{copied ? "Zkopírováno ✓" : "Kopírovat zálohu"}</button>
          <p className="backup-label" style={{ marginTop: 16 }}>Obnovit ze zálohy</p>
          <textarea className="backup-code" placeholder="Sem vlož dříve zkopírovaný kód…" value={paste} onChange={(e) => setPaste(e.target.value)} rows={3} />
          <button className="ghost dark" onClick={restore} disabled={!paste.trim()}>Obnovit postup</button>
          {msg && <p className="backup-msg">{msg}</p>}
        </div>
      )}
    </section>
  );
}

function HabitRow({ habit, checked, onToggle }) {
  return (
    <li className={`row${checked ? " done" : ""}`}>
      <button className="row-btn" onClick={onToggle}>
        <span className={`box${checked ? " on" : ""}`}>{checked ? "✓" : ""}</span>
        <span className="row-name">{habit.name}</span>
        <span className="row-reward">{money(habit.reward)}</span>
      </button>
    </li>
  );
}

function GoalEditor({ goal, onSave, onCancel }) {
  const [name, setName] = useState(goal.name);
  const [amount, setAmount] = useState(String(goal.amount));
  return (
    <div className="editor">
      <label className="fld"><span>Na co šetříš</span>
        <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Např. nová sluchátka" /></label>
      <label className="fld"><span>Cílová částka (Kč)</span>
        <input inputMode="numeric" value={amount} onChange={(e) => setAmount(e.target.value.replace(/[^\d]/g, ""))} placeholder="5000" /></label>
      <div className="editor-actions">
        <button className="solid" onClick={() => onSave({ name: name.trim() || "Odměna", amount: Number(amount) || 0 })}>Uložit</button>
        <button className="ghost" onClick={onCancel}>Zrušit</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
